apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceService
metadata:
  name: distributed-tracing-llama
  namespace: distributed-tracing
  annotations:
spec:
  router:
    scheduler:
      template:
        containers:
          - name: main
            args:
              - --tracing=true
            env:
              - name: OTEL_SERVICE_NAME
                value: "gateway-api-inference-extension"
              - name: OTEL_EXPORTER_OTLP_ENDPOINT
                value: "http://otel-collector:4317"
              - name: OTEL_TRACES_EXPORTER
                value: "otlp"
              - name: OTEL_RESOURCE_ATTRIBUTES_NODE_NAME
                valueFrom:
                  fieldRef:
                    apiVersion: v1
                    fieldPath: spec.nodeName
              - name: OTEL_RESOURCE_ATTRIBUTES_POD_NAME
                valueFrom:
                  fieldRef:
                    apiVersion: v1
                    fieldPath: metadata.name
              - name: OTEL_RESOURCE_ATTRIBUTES
                value: "k8s.namespace.name=$(NAMESPACE),k8s.node.name=$(OTEL_RESOURCE_ATTRIBUTES_NODE_NAME),k8s.pod.name=$(OTEL_RESOURCE_ATTRIBUTES_POD_NAME)"
              - name: OTEL_TRACES_SAMPLER
                value: "parentbased_traceidratio"
              - name: OTEL_TRACES_SAMPLER_ARG
                value: "0.1"
    route: {}
    gateway:
      refs: # Reference the gateway we created
      - name: distributed-tracing-gateway
        namespace: distributed-tracing
  model:
    uri: hf://Qwen/Qwen2.5-7B-Instruct
    name: Qwen/Qwen2.5-7B-Instruct
  template:
    containers:
      - name: main
        image: quay.io/aipcc/rhaiis/cuda-ubi9:3.4.0 # If using Accelerators, use the corresponding inference-image, current latest RHAIIS
        #image: registry.redhat.io/rhaii-early-access/vllm-cuda-rhel9:3.4.0 # Official RHAIIS EA2 image
        imagePullPolicy: Always
        args:
          - --otlp-traces-endpoint
          - "http://otel-collector:4317"
          - --collect-detailed-traces
          - "all"
        env:
          - name: OTEL_SERVICE_NAME
            value: "vllm-decode"
          - name: OTEL_EXPORTER_OTLP_ENDPOINT
            value: "http://otel-collector:4317"
          - name: OTEL_TRACES_EXPORTER
            value: "otlp"
          - name: OTEL_TRACES_SAMPLER
            value: "parentbased_traceidratio"
          - name: OTEL_TRACES_SAMPLER_ARG
            value: "0.1"
        resources:
          limits:
            cpu: '4'
            memory: 32Gi
            nvidia.com/gpu: 1
          requests:
            cpu: '2'
            memory: 16Gi
            nvidia.com/gpu: 1
