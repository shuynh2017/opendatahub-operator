apiVersion: serving.kserve.io/v1alpha2
kind: LLMInferenceService
metadata:
  name: distributed-tracing-sim
  namespace: distributed-tracing
spec:
  router:
    scheduler:
      template:
        containers:
          - name: main
            args:
              - --tracing=true
            env:
              - name: OTEL_SERVICE_NAME
                value: "gateway-api-inference-extension"
              - name: OTEL_EXPORTER_OTLP_ENDPOINT
                value: "http://otel-collector:4317"
              - name: OTEL_TRACES_EXPORTER
                value: "otlp"
              - name: OTEL_RESOURCE_ATTRIBUTES_NODE_NAME
                valueFrom:
                  fieldRef:
                    apiVersion: v1
                    fieldPath: spec.nodeName
              - name: OTEL_RESOURCE_ATTRIBUTES_POD_NAME
                valueFrom:
                  fieldRef:
                    apiVersion: v1
                    fieldPath: metadata.name
              - name: OTEL_RESOURCE_ATTRIBUTES
                value: "k8s.namespace.name=$(NAMESPACE),k8s.node.name=$(OTEL_RESOURCE_ATTRIBUTES_NODE_NAME),k8s.pod.name=$(OTEL_RESOURCE_ATTRIBUTES_POD_NAME)"
              - name: OTEL_TRACES_SAMPLER
                value: "parentbased_traceidratio"
              - name: OTEL_TRACES_SAMPLER_ARG
                value: "0.1"
    route: {}
    gateway:
      refs: # Reference the gateway we created
      - name: distributed-tracing-gateway
        namespace: distributed-tracing
  model:
    uri: hf://Qwen/Qwen2.5-7B-Instruct
    name: Qwen/Qwen2.5-7B-Instruct
  template:
    containers:
      - name: main
        image: ghcr.io/llm-d/llm-d-inference-sim:v0.8.0
        command: ["/app/llm-d-inference-sim"]
        args:
          - "--port"
          - "8000"
          - "--model"
          - "Qwen/Qwen2.5-7B-Instruct"
          - "--mode"
          - "random"
          - "--max-num-seqs"
          - "5"
          - "--time-to-first-token"
          - "100"
          - "--inter-token-latency"
          - "30"
        resources:
          requests:
            cpu: "200m"
            memory: "2Gi"
          limits:
            cpu: "1"
            memory: "2Gi"
        # startupProbe:
        #   httpGet:
        #     path: /health
        #     port: 8000
        #     scheme: HTTP
        # readinessProbe:
        #   httpGet:
        #     path: /health
        #     port: 8000
        #     scheme: HTTP
        # livenessProbe:
        #   httpGet:
        #     path: /health
        #     port: 8000
        #     scheme: HTTP
