# OpenTelemetryCollector instance deployed via the Red Hat build of OpenTelemetry operator.
#
# Replaces the upstream otel-collector Deployment + ConfigMap from llm-d.
# The operator manages the collector Deployment, Service, and config for us.
#
# The operator creates a Service named "<name>-collector", so name "otel"
# produces the service "otel-collector" on ports 4317 (gRPC) and 4318 (HTTP).
# Point vLLM / llm-d OTLP_ENDPOINT at otel-collector:4317.
#
# Traces are forwarded to the Tempo instance created in step 03.
---
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel
  namespace: distributed-tracing
spec:
  mode: deployment
  observability:
    metrics:
      enableMetrics: true
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
          http:
            endpoint: "0.0.0.0:4318"

    processors:
      # Drop traces generated by Prometheus scraping /metrics — these are noise.
      filter/drop-metrics-scraping:
        error_mode: ignore
        traces:
          span:
            - 'attributes["url.path"] == "/metrics"'
            - 'attributes["http.route"] == "/metrics"'
            - name == "GET /metrics"
            - name == "GET"
      batch:
        send_batch_size: 1024
        timeout: 1s

    exporters:
      # Forward traces to the Tempo instance (step 03) via OTLP gRPC.
      # TempoMonolithic named "tracing" creates a service:
      #   tempo-tracing:4317 (OTLP gRPC)
      otlp/tempo:
        endpoint: "tempo-tracing:4317"
        tls:
          insecure: true

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [filter/drop-metrics-scraping, batch]
          exporters: [otlp/tempo]
